<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <!-- Background: soft rounded square with lavender -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="#9b97d4"/>

  <!-- Subtle top highlight -->
  <rect x="2" y="2" width="44" height="22" rx="12" fill="url(#h)"/>

  <!-- Three kanban cards -->
  <!-- Left card -->
  <rect x="8" y="13" width="9" height="12" rx="3.5" fill="#fff" opacity="0.88"/>
  <!-- Center card (slightly taller → active/selected) -->
  <rect x="19.5" y="10" width="9" height="16" rx="3.5" fill="#fff"/>
  <!-- Right card -->
  <rect x="31" y="15" width="9" height="10" rx="3.5" fill="#fff" opacity="0.82"/>

  <!-- Flow arrow on center card -->
  <path d="M22 18l2.5 2.5L22 23" stroke="#9b97d4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle check on right card -->
  <path d="M33.5 19.5l1.8 2.2 3.5-2.7" stroke="#9b97d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>

  <defs>
    <linearGradient id="h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
